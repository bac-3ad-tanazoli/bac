	<script>
	let fin = new Date('2026-07-12T10:00:00.00');
	let now = new Date();
	tleft = fin-now;
function printthe() {

	now = new Date();
	tleft = fin-now;

	let daysleft = Math.trunc(tleft/1000/60/60/24);
	let hoursleft = Math.trunc(tleft/1000/60/60) - Math.trunc(Math.trunc(tleft/1000/60/60)/24)*24;
	let minleft = Math.trunc(tleft/1000/60) - Math.trunc(Math.trunc(tleft/1000/60)/60)*60;
	let secleft = Math.trunc(tleft/1000)- Math.trunc(Math.trunc(tleft/1000)/60)*60;

	document.getElementById('days').innerText = daysleft ;
	document.getElementById('hours').innerText = hoursleft;
	document.getElementById('min').innerText = minleft ;
	document.getElementById('sec').innerText = secleft ;
		if (tleft < 2) {
	clearInterval(repeat);
	document.getElementById('day').innerText = null ;
	document.getElementById('hour').innerText = null ;
	document.getElementById('min').innerText = null ;
	document.getElementById('sec').innerText = null ;
	document.getElementById('h').innerText = "" ;
}


}
const repeat = setInterval(printthe,1000);
